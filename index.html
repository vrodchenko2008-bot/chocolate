<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Для коханої людини</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #f5e6d3, #f0c9a4);
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 15px;
      width: 100%;
    }

    img {
      width: 85vw;
      max-width: 380px;
      height: auto;
      cursor: pointer;
      transition: transform 0.3s;
      border-radius: 12px;
    }

    img:hover {
      transform: scale(1.05);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      padding: 15px;
    }

    /* ВАЖНО: отдельный класс для центрирования */
    .modal.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      width: 100%;
      max-width: 320px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      animation: fadeIn 0.3s ease;
    }

    .modal-content p {
      font-size: 16px;
      line-height: 1.5;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      background: #8b4513;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
    }

    button:hover {
      background: #a0522d;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>

<div class="container">
  <img src="photo.png" alt="Шоколадка" onclick="openModal()">
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <p>
      Для найріднішої людини ❤️<br><br>
      Ти робиш мій світ теплішим, яскравішим і солодшим, як ця шоколадка 🍫<br>
      Дякую, що ти є 💕
    </p>
    <button onclick="goToLink()">Хочу ще чай ☕</button>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById('modal').classList.add('active');
  }

  function goToLink() {
    window.location.href = "https://vrodchenko2008-bot.github.io/tea/";
  }

  window.onclick = function(event) {
    const modal = document.getElementById('modal');
    if (event.target === modal) {
      modal.classList.remove('active');
    }
  }
</script>

</body>
</html>
