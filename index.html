<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Для коханої людини</title>
  <style>
    /* Базові налаштування для уникнення проблем з розмірами */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      /* Використовуємо modern viewport height для мобільних */
      min-height: 100dvh; 
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #f5e6d3, #f0c9a4);
      font-family: Arial, sans-serif;
      overflow: hidden; /* Щоб сторінка не смикалася при відкритті модалки */
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    img {
      width: 85vw;
      max-width: 380px;
      height: auto;
      cursor: pointer;
      transition: transform 0.3s;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    img:hover {
      transform: scale(1.05);
    }

    /* Модальне вікно */
    .modal {
      display: none; /* Приховано за замовчуванням */
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px); /* Легке розмиття фону */
      padding: 20px;
    }

    /* Клас, який ми додаємо через JS */
    .modal.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 30px 20px;
      border-radius: 20px;
      text-align: center;
      width: 100%;
      max-width: 340px; /* Оптимальна ширина для мобільних */
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-content p {
      font-size: 18px;
      line-height: 1.6;
      color: #4a4a4a;
      margin: 0;
    }

    button {
      margin-top: 25px;
      padding: 15px 25px;
      border: none;
      background: #8b4513;
      color: white;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      width: 100%;
      transition: background 0.3s, transform 0.1s;
    }

    button:active {
      transform: scale(0.98);
    }

    /* Анімація появи */
    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.8) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="container">
  <img src="photo.png" alt="Шоколадка" onclick="openModal()">
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <p>
      Для найріднішої людини ❤️<br><br>
      Ти робиш мій світ теплішим, яскравішим і солодшим, як ця шоколадка 🍫<br><br>
      Дякую, що ти є 💕
    </p>
    <button onclick="goToLink()">Хочу ще чай ☕</button>
  </div>
</div>

<script>
  const modal = document.getElementById('modal');

  function openModal() {
    modal.classList.add('active');
    // Забороняємо прокрутку фону при відкритому вікні
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.classList.remove('active');
    document.body.style.overflow = 'auto';
  }

  function goToLink() {
    window.location.href = "https://vrodchenko2008-bot.github.io/tea/";
  }

  // Закриття при кліку на темний фон
  window.onclick = function(event) {
    if (event.target === modal) {
      closeModal();
    }
  }
</script>

</body>
</html>
