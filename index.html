<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Для любимого человека</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #f5e6d3, #f0c9a4);
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    img {
      width: 80vw;
      max-width: 350px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    img:hover {
      transform: scale(1.05);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 300px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    .modal-content p {
      font-size: 16px;
      line-height: 1.5;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      background: #8b4513;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #a0522d;
    }
  </style>
</head>
<body>

<div class="container">
  <img src="photo.png" alt="Шоколадка" onclick="openModal()">
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <p>
      Для самого любимого человека ❤️<br><br>
      Ты делаешь мой мир теплее, ярче и вкуснее, как эта шоколадка 🍫
      Спасибо, что ты есть 💕
    </p>
    <button onclick="goToLink()">Хочу ещё чай ☕</button>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById('modal').style.display = 'flex';
  }

  function goToLink() {
    // ВСТАВЬ СЮДА СВОЮ ССЫЛКУ
    window.location.href = "#";
  }

  window.onclick = function(event) {
    const modal = document.getElementById('modal');
    if (event.target === modal) {
      modal.style.display = 'none';
    }
  }
</script>

</body>
</html>
